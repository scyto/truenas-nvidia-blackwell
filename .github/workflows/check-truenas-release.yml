name: Check for New TrueNAS Releases

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for new TrueNAS 25.10.x releases
        id: check_release
        run: |
          # Fetch tags from scale-build repo
          TAGS_JSON=$(curl -sf "https://api.github.com/repos/truenas/scale-build/tags?per_page=100" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}")

          # Find the latest stable 25.10.x tag (exclude BETA/RC)
          LATEST_TAG=$(echo "$TAGS_JSON" | python3 -c "
          import sys, json
          tags = json.load(sys.stdin)
          goldeye = [
              t['name'] for t in tags
              if t['name'].startswith('TS-25.10.')
              and 'BETA' not in t['name'].upper()
              and 'RC' not in t['name'].upper()
          ]
          if not goldeye:
              print('')
              sys.exit()
          # Sort by version components
          goldeye.sort(key=lambda x: [int(p) for p in x.replace('TS-','').split('.')])
          print(goldeye[-1])
          ")

          LATEST_VERSION="${LATEST_TAG#TS-}"
          CURRENT_VERSION=$(cat version)

          echo "Latest TrueNAS tag: ${LATEST_TAG} (version: ${LATEST_VERSION})"
          echo "Current tracked version: ${CURRENT_VERSION}"

          if [ -n "$LATEST_VERSION" ] && [ "$LATEST_VERSION" != "$CURRENT_VERSION" ]; then
            echo "New release detected!"
            echo "new_release=true" >> "$GITHUB_OUTPUT"
            echo "new_version=${LATEST_VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "No new release"
            echo "new_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read NVIDIA driver version
        if: steps.check_release.outputs.new_release == 'true'
        id: nvidia
        run: |
          echo "nvidia_version=$(cat .nvidia-driver-version | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Read train name
        if: steps.check_release.outputs.new_release == 'true'
        id: train
        run: |
          echo "train=$(cat train | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Check if PR already exists
        if: steps.check_release.outputs.new_release == 'true'
        id: existing_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ steps.check_release.outputs.new_version }}"
          # Check for open PRs with matching branch name
          EXISTING=$(gh pr list --state open --head "truenas-update/${NEW_VERSION}" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "PR #${EXISTING} already exists for ${NEW_VERSION}"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR for new TrueNAS release
        if: steps.check_release.outputs.new_release == 'true' && steps.existing_pr.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ steps.check_release.outputs.new_version }}"
          NVIDIA_VERSION="${{ steps.nvidia.outputs.nvidia_version }}"
          TRAIN="${{ steps.train.outputs.train }}"
          BRANCH="truenas-update/${NEW_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create branch and update version files
          git checkout -b "${BRANCH}"
          echo -n "${NEW_VERSION}" > version

          # Update build.yml default truenas_version (matches lines like: default: '25.10.2.1')
          # This updates both workflow_dispatch and workflow_call defaults
          sed -i "/truenas_version:/{n;n;s/default: '[0-9.]*'/default: '${NEW_VERSION}'/}" .github/workflows/build.yml

          git add version .github/workflows/build.yml
          git commit -m "Update TrueNAS version to ${NEW_VERSION}"
          git push -u origin "${BRANCH}"

          PR_BODY="## Summary
          - New TrueNAS release detected: **${NEW_VERSION}**
          - NVIDIA driver: **${NVIDIA_VERSION}**
          - Train: **${TRAIN}**

          ## Changes
          - Updated \`version\` file to track new release
          - Updated \`build.yml\` defaults to match

          ## After merging
          Trigger the **Build NVIDIA Sysext** workflow to build the new sysext.

          Generated automatically by the TrueNAS release checker."

          gh pr create \
            --title "Update TrueNAS to ${NEW_VERSION}" \
            --body "${PR_BODY}" \
            --label "truenas-update"
